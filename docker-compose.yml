services:
  # ── Entry point: reverse proxy on port 20001 ──────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "20001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Backend: Flask / Gunicorn ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override to use Docker internal MySQL for testing
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: changeme
      DB_NAME: everyday_card
      # Override Redis to use Docker internal service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Frontend: React (built) served via nginx ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_DAILY_READING_URL: /api/daily-reading
    restart: unless-stopped

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-everyday_card}
    volumes:
      - /data/daily_intensive_reading/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - /data/daily_intensive_reading/redis:/data
    restart: unless-stopped
